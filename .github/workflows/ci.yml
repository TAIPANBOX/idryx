name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.5"
          cache: true
      - name: gofmt
        run: test -z "$(gofmt -l .)" || (gofmt -l .; exit 1)
      - name: vet
        run: go vet ./...
      - name: staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          staticcheck ./...
      - name: test
        run: go test -race ./...
      - name: build
        run: go build ./...

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.5"
          cache: true
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
      - name: gosec
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec -quiet ./...

  ebpf:
    name: ebpf (build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.5"
          cache: true
      - name: system deps
        run: sudo apt-get update && sudo apt-get install -y clang
      # bpftool from a static release, not the linux-tools-generic apt
      # package: that package is tied to a specific installed kernel
      # package version and 404s whenever the runner's actual running
      # kernel doesn't match one, e.g. Azure-hosted runners' own
      # backported kernel flavor.
      - name: install bpftool
        run: |
          curl -fsSL -o /tmp/bpftool.tar.gz \
            https://github.com/libbpf/bpftool/releases/download/v7.7.0/bpftool-v7.7.0-amd64.tar.gz
          sudo tar -xzf /tmp/bpftool.tar.gz -C /usr/local/bin bpftool
          sudo chmod +x /usr/local/bin/bpftool
      # Absolute path, not "sudo bpftool": sudo's secure_path can put a
      # runner-image-preinstalled, kernel-version-locked bpftool wrapper
      # ahead of the one just installed above, silently shadowing it.
      - name: regenerate vmlinux.h from this runner's BTF
        run: sudo /usr/local/bin/bpftool btf dump file /sys/kernel/btf/vmlinux format c > internal/ebpfcapture/bpf/vmlinux.h
      - name: go generate (bpf2go) -- catches connect.c/committed-output drift
        run: go generate ./internal/ebpfcapture/...
      - name: build
        run: go build ./...
      - name: vet
        run: go vet ./...

  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: idryx
          POSTGRES_PASSWORD: idryx
          POSTGRES_DB: idryx_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.5"
          cache: true
      - name: integration tests
        env:
          DATABASE_URL: postgres://idryx:idryx@localhost:5432/idryx_test?sslmode=disable
        run: go test -tags integration ./internal/graph/
