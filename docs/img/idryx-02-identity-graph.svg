<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif"><defs>
  <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#0a0e16"/><stop offset="1" stop-color="#0d1117"/>
  </linearGradient>
  <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0" stop-color="#2dd4bf"/><stop offset="0.5" stop-color="#4493f8"/><stop offset="1" stop-color="#2dd4bf"/>
  </linearGradient>
  <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
    <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#161d27" stroke-width="1"/>
  </pattern>
  <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.45"/>
  </filter>
  <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
    <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#2dd4bf" flood-opacity="0.5"/>
  </filter>
</defs><rect x="0" y="0" width="1280" height="720" rx="0" ry="0" fill="url(#bg)"/><rect x="0" y="0" width="1280" height="720" fill="url(#grid)" opacity="0.5"/><rect x="0" y="0" width="1280" height="4" fill="url(#accent)"/><text x="1252" y="698" font-size="12.5" fill="#69788b" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="400" text-anchor="end">github.com/TAIPANBOX/idryx</text><text x="40" y="56" font-size="28" fill="#e6edf3" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="700" text-anchor="start">One graph, every identity</text><text x="40" y="84" font-size="15" fill="#9aa7b8" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="400" text-anchor="start">Humans, service accounts, keys and AI agents — linked by ownership and on_behalf_of delegation.</text><line x1="40" y1="100" x2="1240" y2="100" stroke="#222b38" stroke-width="1"/><text x="40" y="132" font-size="11.5" fill="#69788b" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="700" text-anchor="start" letter-spacing="1.2">IDENTITY TYPES</text><circle cx="200" cy="128" r="6" fill="#1a212c" stroke="#4493f8" stroke-width="2"/><text x="214" y="132" font-size="12.5" fill="#9aa7b8" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="400" text-anchor="start">Human</text><circle cx="278.0" cy="128" r="6" fill="#1a212c" stroke="#2dd4bf" stroke-width="2"/><text x="292.0" y="132" font-size="12.5" fill="#9aa7b8" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="400" text-anchor="start">Service account</text><circle cx="432.0" cy="128" r="6" fill="#1a212c" stroke="#e3b341" stroke-width="2"/><text x="446.0" y="132" font-size="12.5" fill="#9aa7b8" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="400" text-anchor="start">Key</text><circle cx="494.8" cy="128" r="6" fill="#1a212c" stroke="#a371f7" stroke-width="2"/><text x="508.8" y="132" font-size="12.5" fill="#9aa7b8" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="400" text-anchor="start">AI agent</text><rect x="40" y="170" width="600" height="470" rx="14" ry="14" fill="#141a23" stroke="#283341" stroke-width="1" filter="soft"/><text x="64" y="204" font-size="14.5" fill="#e6edf3" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="700" text-anchor="start">Delegation chain — excessive_agency (OWASP LLM06)</text><line x1="150" y1="268" x2="350" y2="268" stroke="#a371f7" stroke-width="1.8" opacity="0.7"/><line x1="350" y1="268" x2="350" y2="392" stroke="#2dd4bf" stroke-width="1.8" opacity="0.7"/><line x1="350" y1="392" x2="350" y2="516" stroke="#4493f8" stroke-width="1.8" opacity="0.7"/><line x1="350" y1="392" x2="566" y2="392" stroke="#ff6b63" stroke-width="2" stroke-dasharray="5 4" opacity="0.85"/><text x="250" y="256" font-size="10" fill="#69788b" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="400" text-anchor="middle">on_behalf_of</text><text x="366" y="330" font-size="10" fill="#69788b" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="400" text-anchor="start">on_behalf_of</text><text x="366" y="454" font-size="10" fill="#69788b" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="400" text-anchor="start">owned_by</text><text x="458" y="360" font-size="10" fill="#ff6b63" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="700" text-anchor="middle">can act as → admin</text><rect x="98.6" y="240.0" width="102.8" height="56" rx="28.0" ry="28.0" fill="none" stroke="#a371f7" stroke-width="1.1" opacity="0.3"/><rect x="102.6" y="244.0" width="94.8" height="48" rx="24.0" ry="24.0" fill="#1a212c" stroke="#a371f7" stroke-width="2"/><text x="150" y="266" font-size="12.5" fill="#e6edf3" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="700" text-anchor="middle">AI agent</text><text x="150" y="282" font-size="9.5" fill="#a371f7" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="700" text-anchor="middle" letter-spacing="0.4">agent-07</text><rect x="294.55" y="240.0" width="110.89999999999999" height="56" rx="28.0" ry="28.0" fill="none" stroke="#a371f7" stroke-width="1.1" opacity="0.3"/><rect x="298.55" y="244.0" width="102.89999999999999" height="48" rx="24.0" ry="24.0" fill="#1a212c" stroke="#a371f7" stroke-width="2"/><text x="350" y="266" font-size="12.5" fill="#e6edf3" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="700" text-anchor="middle">sub-agent</text><text x="350" y="282" font-size="9.5" fill="#a371f7" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="700" text-anchor="middle" letter-spacing="0.4">tool-runner</text><rect x="282.4" y="364.0" width="135.2" height="56" rx="28.0" ry="28.0" fill="none" stroke="#2dd4bf" stroke-width="1.1" opacity="0.3"/><rect x="286.4" y="368.0" width="127.19999999999999" height="48" rx="24.0" ry="24.0" fill="#1a212c" stroke="#2dd4bf" stroke-width="2"/><text x="350" y="390" font-size="12.5" fill="#e6edf3" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="700" text-anchor="middle">service acct</text><text x="350" y="406" font-size="9.5" fill="#2dd4bf" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="700" text-anchor="middle" letter-spacing="0.4">ci-deployer</text><rect x="304.0" y="488.0" width="92.0" height="56" rx="28.0" ry="28.0" fill="none" stroke="#4493f8" stroke-width="1.1" opacity="0.3"/><rect x="308.0" y="492.0" width="84.0" height="48" rx="24.0" ry="24.0" fill="#1a212c" stroke="#4493f8" stroke-width="2"/><text x="350" y="514" font-size="12.5" fill="#e6edf3" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="700" text-anchor="middle">human</text><text x="350" y="530" font-size="9.5" fill="#4493f8" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="700" text-anchor="middle" letter-spacing="0.4">alice@corp</text><rect x="512.0" y="361.0" width="108" height="62" rx="31.0" ry="31.0" fill="none" stroke="#ff6b63" stroke-width="1.1" opacity="0.3"/><rect x="516.0" y="365.0" width="100" height="54" rx="27.0" ry="27.0" fill="#1a212c" stroke="#ff6b63" stroke-width="2"/><text x="566" y="390" font-size="13.5" fill="#e6edf3" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="700" text-anchor="middle">admin</text><text x="566" y="406" font-size="9.5" fill="#ff6b63" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="700" text-anchor="middle" letter-spacing="0.4">*:* on prod</text><text x="64" y="624" font-size="11.5" fill="#9aa7b8" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="400" text-anchor="start">blast radius = union of everything the agent can act as</text><rect x="672" y="170" width="568" height="96" rx="12" ry="12" fill="#1b2331" stroke="#283341" stroke-width="1" filter="soft"/><rect x="672" y="170" width="6" height="96" rx="3" ry="3" fill="#a371f7" stroke="#283341" stroke-width="1"/><text x="696" y="208" font-size="15.5" fill="#e6edf3" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="700" text-anchor="start">Resolves on_behalf_of edges</text><text x="696" y="234" font-size="12.5" fill="#9aa7b8" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="400" text-anchor="start">agent → sub-agent → service account → human</text><rect x="672" y="280" width="568" height="96" rx="12" ry="12" fill="#1b2331" stroke="#283341" stroke-width="1" filter="soft"/><rect x="672" y="280" width="6" height="96" rx="3" ry="3" fill="#ff6b63" stroke="#283341" stroke-width="1"/><text x="696" y="318" font-size="15.5" fill="#e6edf3" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="700" text-anchor="start">Computes effective privilege</text><text x="696" y="344" font-size="12.5" fill="#9aa7b8" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="400" text-anchor="start">severity rises with delegation depth</text><rect x="672" y="390" width="568" height="96" rx="12" ry="12" fill="#1b2331" stroke="#283341" stroke-width="1" filter="soft"/><rect x="672" y="390" width="6" height="96" rx="3" ry="3" fill="#2dd4bf" stroke="#283341" stroke-width="1"/><text x="696" y="428" font-size="15.5" fill="#e6edf3" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="700" text-anchor="start">Maps owners</text><text x="696" y="454" font-size="12.5" fill="#9aa7b8" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="400" text-anchor="start">who can rotate or revoke each identity</text><rect x="672" y="500" width="568" height="132" rx="12" ry="12" fill="#1b2331" stroke="#283341" stroke-width="1" filter="soft"/><rect x="672" y="500" width="6" height="132" rx="3" ry="3" fill="#4493f8" stroke="#283341" stroke-width="1"/><text x="696" y="538" font-size="15.5" fill="#e6edf3" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="700" text-anchor="start">Surfaces the answer</text><text x="696" y="564" font-size="12.5" fill="#9aa7b8" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="400" text-anchor="start">“too much privilege, untouched, just behaved abnormally —</text><text x="696" y="584" font-size="12.5" fill="#9aa7b8" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="400" text-anchor="start">here&#x27;s the owner and what&#x27;s at risk”</text></svg>