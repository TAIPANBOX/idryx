<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="600" viewBox="0 0 1280 600" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif"><defs>
  <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#0a0e16"/><stop offset="1" stop-color="#0d1117"/>
  </linearGradient>
  <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0" stop-color="#2dd4bf"/><stop offset="0.5" stop-color="#4493f8"/><stop offset="1" stop-color="#2dd4bf"/>
  </linearGradient>
  <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
    <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#161d27" stroke-width="1"/>
  </pattern>
  <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.45"/>
  </filter>
  <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
    <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#2dd4bf" flood-opacity="0.5"/>
  </filter>
</defs><rect x="0" y="0" width="1280" height="600" rx="0" ry="0" fill="url(#bg)"/><rect x="0" y="0" width="1280" height="600" fill="url(#grid)" opacity="0.5"/><rect x="0" y="0" width="1280" height="4" fill="url(#accent)"/><text x="1252" y="578" font-size="12.5" fill="#69788b" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="400" text-anchor="end">github.com/TAIPANBOX/idryx</text><text x="40" y="56" font-size="28" fill="#e6edf3" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="700" text-anchor="start">Why now</text><text x="40" y="84" font-size="15" fill="#9aa7b8" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="400" text-anchor="start">The identity market is fragmented — attacks travel through the seams between ITDR, NHI and IAM tools.</text><line x1="40" y1="100" x2="1240" y2="100" stroke="#222b38" stroke-width="1"/><rect x="40.0" y="130" width="384.0" height="132" rx="14" ry="14" fill="#1b2331" stroke="#283341" stroke-width="1" filter="soft"/><rect x="40.0" y="130" width="6" height="132" rx="3" ry="3" fill="#a371f7" stroke="#283341" stroke-width="1"/><text x="66.0" y="192" font-size="42" fill="#a371f7" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="700" text-anchor="start">100:1</text><text x="66.0" y="224" font-size="12.5" fill="#9aa7b8" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="400" text-anchor="start">non-human identities &amp; AI agents</text><text x="66.0" y="244" font-size="12.5" fill="#9aa7b8" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="400" text-anchor="start">vs humans by 2026</text><rect x="448.0" y="130" width="384.0" height="132" rx="14" ry="14" fill="#1b2331" stroke="#283341" stroke-width="1" filter="soft"/><rect x="448.0" y="130" width="6" height="132" rx="3" ry="3" fill="#ff6b63" stroke="#283341" stroke-width="1"/><text x="474.0" y="192" font-size="42" fill="#ff6b63" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="700" text-anchor="start">68%</text><text x="474.0" y="224" font-size="12.5" fill="#9aa7b8" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="400" text-anchor="start">of companies don&#x27;t monitor</text><text x="474.0" y="244" font-size="12.5" fill="#9aa7b8" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="400" text-anchor="start">non-human identities</text><rect x="856.0" y="130" width="384.0" height="132" rx="14" ry="14" fill="#1b2331" stroke="#283341" stroke-width="1" filter="soft"/><rect x="856.0" y="130" width="6" height="132" rx="3" ry="3" fill="#e3b341" stroke="#283341" stroke-width="1"/><text x="882.0" y="192" font-size="42" fill="#e3b341" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="700" text-anchor="start">47%</text><text x="882.0" y="224" font-size="12.5" fill="#9aa7b8" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="400" text-anchor="start">of NHIs haven&#x27;t changed in</text><text x="882.0" y="244" font-size="12.5" fill="#9aa7b8" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="400" text-anchor="start">over a year</text><rect x="40" y="286" width="1200" height="64" rx="14" ry="14" fill="#241317" stroke="#ff6b63" stroke-width="1.3"/><rect x="40" y="286" width="6" height="64" rx="3" ry="3" fill="#ff6b63" stroke="#283341" stroke-width="1"/><text x="66" y="314" font-size="15" fill="#ff6b63" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="700" text-anchor="start">ITDR sees logins. NHI tools see keys. IAM sees permissions.</text><text x="66" y="338" font-size="13" fill="#9aa7b8" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="400" text-anchor="start">Attacks travel through the seams between them — idryx sees all dimensions at once.</text><text x="40" y="406" font-size="11.5" fill="#69788b" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="700" text-anchor="start" letter-spacing="1.2">DETERMINISTIC PIPELINE</text><rect x="40" y="420" width="265.5" height="96" rx="12" ry="12" fill="#1b2331" stroke="#2dd4bf" stroke-width="1.4" filter="soft"/><text x="60" y="456" font-size="16" fill="#e6edf3" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="700" text-anchor="start">Ingest</text><text x="60" y="482" font-size="11.5" fill="#9aa7b8" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="400" text-anchor="start">read-only connectors →</text><text x="60" y="500" font-size="11.5" fill="#9aa7b8" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="400" text-anchor="start">one model</text><line x1="313.5" y1="476" x2="336.5" y2="476" stroke="#69788b" stroke-width="2.2"/><path d="M 343.5 476 l -9 -5 l 0 10 z" fill="#69788b"/><rect x="351.5" y="420" width="265.5" height="96" rx="12" ry="12" fill="#1b2331" stroke="#4493f8" stroke-width="1.4" filter="soft"/><text x="371.5" y="456" font-size="16" fill="#e6edf3" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="700" text-anchor="start">Baseline</text><rect x="369.5" y="470" width="9" height="9" rx="2" ry="2" fill="#4493f8" stroke="#283341" stroke-width="1"/><text x="385.5" y="479" font-size="11.5" fill="#9aa7b8" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="400" text-anchor="start">learn per-identity normal</text><line x1="625.0" y1="476" x2="648.0" y2="476" stroke="#69788b" stroke-width="2.2"/><path d="M 655.0 476 l -9 -5 l 0 10 z" fill="#69788b"/><rect x="663.0" y="420" width="265.5" height="96" rx="12" ry="12" fill="#1b2331" stroke="#a371f7" stroke-width="1.4" filter="soft"/><text x="683.0" y="456" font-size="16" fill="#e6edf3" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="700" text-anchor="start">Detect</text><rect x="681.0" y="470" width="9" height="9" rx="2" ry="2" fill="#a371f7" stroke="#283341" stroke-width="1"/><text x="697.0" y="479" font-size="11.5" fill="#9aa7b8" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="400" text-anchor="start">rules + stats over the graph</text><line x1="936.5" y1="476" x2="959.5" y2="476" stroke="#69788b" stroke-width="2.2"/><path d="M 966.5 476 l -9 -5 l 0 10 z" fill="#69788b"/><rect x="974.5" y="420" width="265.5" height="96" rx="12" ry="12" fill="#1b2331" stroke="#3fb950" stroke-width="1.4" filter="soft"/><text x="994.5" y="456" font-size="16" fill="#e6edf3" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="700" text-anchor="start">Deliver</text><text x="994.5" y="482" font-size="11.5" fill="#9aa7b8" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="400" text-anchor="start">ranked alerts · PRs</text><text x="994.5" y="500" font-size="11.5" fill="#9aa7b8" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="400" text-anchor="start">· dashboard</text></svg>